<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - AlphaAnalytics</title>
  
  <!-- Fonts & Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- AOS Animation -->
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
  
  <!-- Chart.js for candlestick background -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  
  <style>
    :root {
      --primary: #6366f1;
      --primary-dark: #4f46e5;
      --primary-light: #818cf8;
      --secondary: #10b981;
      --accent: #f59e0b;
      --danger: #ef4444;
      --success: #22c55e;
      --dark-bg: #0f172a;
      --darker-bg: #0b1120;
      --card-bg: rgba(30, 41, 59, 0.8);
      --text-primary: #f8fafc;
      --text-secondary: #cbd5e1;
      --text-muted: #94a3b8;
      --border: rgba(51, 65, 85, 0.5);
      --gradient-primary: linear-gradient(135deg, #6366f1, #8b5cf6);
      --gradient-success: linear-gradient(135deg, #10b981, #059669);
      --gradient-dark: linear-gradient(135deg, #0f172a, #1e293b);
      
      --shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      --shadow-lg: 0 30px 60px -15px rgba(0, 0, 0, 0.6);
      --shadow-glow: 0 0 30px rgba(99, 102, 241, 0.3);
      
      --radius-lg: 24px;
      --radius-md: 16px;
      --radius-sm: 12px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--darker-bg);
      color: var(--text-primary);
      min-height: 100vh;
      overflow: hidden;
      position: relative;
    }

    /* Animated Candlestick Background */
    #chart-background {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      opacity: 0.15;
      pointer-events: none;
    }

    /* Floating Market Ticker */
    .ticker-wrap {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      overflow: hidden;
      height: 40px;
      background: rgba(15, 23, 42, 0.9);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
      z-index: 10;
      white-space: nowrap;
      display: flex;
      align-items: center;
    }

    .ticker {
      display: inline-flex;
      animation: ticker 30s linear infinite;
    }

    .ticker-item {
      display: inline-flex;
      align-items: center;
      padding: 0 20px;
      font-size: 14px;
      font-weight: 500;
    }

    .ticker-symbol {
      color: var(--primary-light);
      margin-right: 6px;
      font-weight: 600;
    }

    .ticker-price {
      margin-right: 4px;
    }

    .ticker-change {
      padding: 2px 6px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
    }

    .ticker-change.positive {
      background: rgba(34, 197, 94, 0.2);
      color: var(--success);
    }

    .ticker-change.negative {
      background: rgba(239, 68, 68, 0.2);
      color: var(--danger);
    }

    @keyframes ticker {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    /* Main Container */
    .container {
      position: relative;
      z-index: 5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    /* Glass Card */
    .auth-card {
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: var(--radius-lg);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      width: 100%;
      max-width: 440px;
      padding: 40px;
      position: relative;
      overflow: hidden;
      animation: cardFloat 0.6s ease-out;
    }

    .auth-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: var(--gradient-primary);
    }

    .auth-card::after {
      content: '';
      position: absolute;
      top: -50%;
      right: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(99, 102, 241, 0.1) 0%, transparent 70%);
      animation: pulseGlow 8s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes cardFloat {
      0% {
        opacity: 0;
        transform: translateY(30px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes pulseGlow {
      0%, 100% {
        opacity: 0.3;
        transform: scale(1);
      }
      50% {
        opacity: 0.6;
        transform: scale(1.05);
      }
    }

    /* Logo */
    .logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo i {
      font-size: 48px;
      background: var(--gradient-primary);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 12px;
    }

    .logo h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 32px;
      font-weight: 700;
      background: var(--gradient-primary);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }

    .logo p {
      color: var(--text-muted);
      font-size: 14px;
    }

    /* Form */
    .form-group {
      margin-bottom: 24px;
      position: relative;
    }

    .form-group label {
      display: block;
      color: var(--text-secondary);
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 8px;
    }

    .input-wrapper {
      position: relative;
    }

    .input-wrapper i {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 18px;
      transition: all 0.3s;
      z-index: 1;
    }

    .input-wrapper .toggle-password {
      left: auto;
      right: 16px;
      cursor: pointer;
    }

    .input-wrapper .toggle-password:hover {
      color: var(--primary);
    }

    .form-control {
      width: 100%;
      padding: 16px 16px 16px 48px;
      background: rgba(15, 23, 42, 0.6);
      border: 2px solid var(--border);
      border-radius: var(--radius-md);
      color: var(--text-primary);
      font-size: 15px;
      transition: all 0.3s;
      backdrop-filter: blur(5px);
    }

    .form-control:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: var(--shadow-glow);
      background: rgba(15, 23, 42, 0.8);
    }

    .form-control:focus + i {
      color: var(--primary);
    }

    /* Remember & Forgot */
    .form-options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }

    .remember-checkbox {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .remember-checkbox input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: var(--primary);
      cursor: pointer;
    }

    .remember-checkbox label {
      color: var(--text-secondary);
      font-size: 14px;
      cursor: pointer;
    }

    .forgot-link {
      color: var(--primary);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.3s;
    }

    .forgot-link:hover {
      color: var(--primary-light);
      text-decoration: underline;
    }

    /* Buttons */
    .btn {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: var(--radius-md);
      font-weight: 600;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      position: relative;
      overflow: hidden;
    }

    .btn::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.2);
      transform: translate(-50%, -50%);
      transition: width 0.6s, height 0.6s;
    }

    .btn:hover::before {
      width: 300px;
      height: 300px;
    }

    .btn-primary {
      background: var(--gradient-primary);
      color: white;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-glow);
    }

    .btn-google {
      background: rgba(255, 255, 255, 0.1);
      color: var(--text-primary);
      border: 1px solid var(--border);
      margin-top: 16px;
    }

    .btn-google:hover {
      background: rgba(255, 255, 255, 0.15);
      border-color: var(--primary);
    }

    .btn-google i {
      color: #EA4335;
    }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 16px;
      margin: 24px 0;
    }

    .divider-line {
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .divider-text {
      color: var(--text-muted);
      font-size: 14px;
    }

    /* Footer */
    .auth-footer {
      text-align: center;
      margin-top: 24px;
      color: var(--text-muted);
      font-size: 14px;
    }

    .auth-footer a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
      margin-left: 4px;
    }

    .auth-footer a:hover {
      text-decoration: underline;
    }

    /* Market Stats */
    .market-stats {
      display: flex;
      justify-content: space-between;
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
    }

    .stat-item {
      text-align: center;
      flex: 1;
    }

    .stat-value {
      font-size: 20px;
      font-weight: 700;
      font-family: 'Space Grotesk', sans-serif;
      color: var(--primary);
      animation: countUp 2s ease-out;
    }

    .stat-label {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    @keyframes countUp {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Floating Elements */
    .floating-element {
      position: absolute;
      pointer-events: none;
      z-index: 1;
    }

    .floating-1 {
      top: 10%;
      left: 5%;
      animation: float 6s ease-in-out infinite;
    }

    .floating-2 {
      bottom: 15%;
      right: 5%;
      animation: float 8s ease-in-out infinite;
    }

    .floating-3 {
      top: 20%;
      right: 10%;
      animation: float 7s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% {
        transform: translateY(0) rotate(0deg);
      }
      50% {
        transform: translateY(-20px) rotate(5deg);
      }
    }

    .candlestick-icon {
      font-size: 60px;
      color: var(--primary);
      opacity: 0.1;
    }

    /* Welcome Back Animation */
    .welcome-text {
      text-align: center;
      margin-bottom: 32px;
      animation: slideIn 0.8s ease-out;
    }

    .welcome-text h2 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 28px;
      margin-bottom: 8px;
      background: var(--gradient-primary);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .welcome-text p {
      color: var(--text-secondary);
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateX(-30px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    /* Responsive */
    @media (max-width: 768px) {
      .auth-card {
        padding: 30px 20px;
      }
      
      .floating-element {
        display: none;
      }
    }

    @media (max-width: 480px) {
      .auth-card {
        padding: 24px 16px;
      }
      
      .form-options {
        flex-direction: column;
        gap: 12px;
        align-items: flex-start;
      }
      
      .market-stats {
        flex-direction: column;
        gap: 16px;
      }
    }

    /* Loading Animation */
    .loading-dots {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }

    .loading-dots span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: white;
      animation: dots 1.4s infinite;
    }

    .loading-dots span:nth-child(2) {
      animation-delay: 0.2s;
    }

    .loading-dots span:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes dots {
      0%, 100% {
        opacity: 0.3;
        transform: scale(1);
      }
      50% {
        opacity: 1;
        transform: scale(1.2);
      }
    }

    .btn.loading .btn-text {
      display: none;
    }

    .btn.loading .loading-dots {
      display: flex;
    }
  </style>
</head>
<body>
  <!-- Floating Ticker -->
  <div class="ticker-wrap">
    <div class="ticker" id="marketTicker">
      <!-- Populated by JavaScript -->
    </div>
  </div>

  <!-- Candlestick Chart Background -->
  <canvas id="chart-background"></canvas>

  <!-- Floating Elements -->
  <div class="floating-element floating-1">
    <i class="fas fa-chart-line candlestick-icon"></i>
  </div>
  <div class="floating-element floating-2">
    <i class="fas fa-chart-bar candlestick-icon"></i>
  </div>
  <div class="floating-element floating-3">
    <i class="fas fa-chart-pie candlestick-icon"></i>
  </div>

  <!-- Main Container -->
  <div class="container">
    <div class="auth-card" data-aos="fade-up">
      <!-- Logo -->
      <div class="logo">
        <i class="fas fa-chart-line"></i>
        <h1>AlphaAnalytics</h1>
      </div>

      <!-- Welcome Back Message -->
      <div class="welcome-text">
        <h2>Welcome Back!</h2>
        <p>Sign in to continue your trading journey</p>
      </div>

      <!-- Login Form -->
      <form id="loginForm">
        <div class="form-group">
          <label>Email Address</label>
          <div class="input-wrapper">
            <i class="fas fa-envelope"></i>
            <input type="email" class="form-control" id="email" placeholder="john@example.com" value="demo@alpha.com" required>
          </div>
        </div>

        <div class="form-group">
          <label>Password</label>
          <div class="input-wrapper">
            <i class="fas fa-lock"></i>
            <input type="password" class="form-control" id="password" placeholder="••••••••" value="demo123" required>
            <i class="fas fa-eye toggle-password" onclick="togglePassword('password')"></i>
          </div>
        </div>

        <div class="form-options">
          <div class="remember-checkbox">
            <input type="checkbox" id="remember">
            <label for="remember">Remember me</label>
          </div>
          <a href="#" class="forgot-link">Forgot Password?</a>
        </div>

        <button type="submit" class="btn btn-primary" id="loginBtn">
          <span class="btn-text">Sign In</span>
          <span class="loading-dots">
            <span></span>
            <span></span>
            <span></span>
          </span>
        </button>

        <div class="divider">
          <span class="divider-line"></span>
          <span class="divider-text">OR</span>
          <span class="divider-line"></span>
        </div>

        <button type="button" class="btn btn-google" onclick="googleLogin()">
          <i class="fab fa-google"></i>
          Sign in with Google
        </button>
      </form>

      <!-- Demo Credentials Note -->
      <div style="text-align: center; margin: 16px 0; padding: 12px; background: rgba(99, 102, 241, 0.1); border-radius: var(--radius-sm);">
        <p style="color: var(--text-secondary); font-size: 13px;">
          <i class="fas fa-info-circle" style="color: var(--primary);"></i>
          Demo: demo@alpha.com / demo123
        </p>
      </div>

      <!-- Footer -->
      <div class="auth-footer">
        Don't have an account? <a href="/signup">Sign Up</a>
      </div>

      <!-- Market Stats -->
      <div class="market-stats">
        <div class="stat-item">
          <div class="stat-value" id="activeSessions">2,847</div>
          <div class="stat-label">Active Sessions</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="todayVolume">$1.2B</div>
          <div class="stat-label">Today's Volume</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="marketStatus">🟢 Open</div>
          <div class="stat-label">Market Status</div>
        </div>
      </div>
    </div>
  </div>

  <!-- AOS Animation -->
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  
  <script>
    // Initialize AOS
    AOS.init({
      duration: 800,
      once: true
    });

    // Candlestick Chart Background
    function initCandlestickBackground() {
      const ctx = document.getElementById('chart-background').getContext('2d');
      
      // Generate random candlestick data
      const generateCandles = (count) => {
        const candles = [];
        let basePrice = 100;
        
        for (let i = 0; i < count; i++) {
          const open = basePrice;
          const close = basePrice + (Math.random() - 0.5) * 10;
          const high = Math.max(open, close) + Math.random() * 5;
          const low = Math.min(open, close) - Math.random() * 5;
          
          candles.push({ open, high, low, close });
          basePrice = close;
        }
        
        return candles;
      };

      const candles = generateCandles(50);
      
      new Chart(ctx, {
        type: 'candlestick',
        data: {
          datasets: [{
            label: 'Market Background',
            data: candles,
            borderColor: '#6366f1',
            borderWidth: 1
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          animation: {
            duration: 0
          },
          plugins: {
            legend: { display: false },
            tooltip: { enabled: false }
          },
          scales: {
            x: { display: false },
            y: { display: false }
          },
          elements: {
            candlestick: {
              color: {
                up: '#22c55e',
                down: '#ef4444'
              }
            }
          }
        }
      });
    }

    // Market Ticker
    function initTicker() {
      const stocks = [
        { symbol: 'AAPL', price: 182.63, change: 1.24 },
        { symbol: 'MSFT', price: 425.50, change: 2.15 },
        { symbol: 'GOOGL', price: 172.34, change: -0.45 },
        { symbol: 'TSLA', price: 245.75, change: -1.23 },
        { symbol: 'NVDA', price: 950.02, change: 5.42 },
        { symbol: 'META', price: 485.60, change: 1.89 },
        { symbol: 'RELIANCE', price: 2856.50, change: 2.35 },
        { symbol: 'TCS', price: 3850.75, change: -0.78 }
      ];
      
      // Duplicate for seamless loop
      const tickerItems = [...stocks, ...stocks];
      
      const tickerEl = document.getElementById('marketTicker');
      tickerEl.innerHTML = tickerItems.map(stock => `
        <div class="ticker-item">
          <span class="ticker-symbol">${stock.symbol}</span>
          <span class="ticker-price">$${stock.price.toFixed(2)}</span>
          <span class="ticker-change ${stock.change >= 0 ? 'positive' : 'negative'}">
            ${stock.change >= 0 ? '+' : ''}${stock.change}%
          </span>
        </div>
      `).join('');
    }

    // Toggle Password Visibility
    function togglePassword(fieldId) {
      const field = document.getElementById(fieldId);
      const icon = field.nextElementSibling;
      
      if (field.type === 'password') {
        field.type = 'text';
        icon.classList.remove('fa-eye');
        icon.classList.add('fa-eye-slash');
      } else {
        field.type = 'password';
        icon.classList.remove('fa-eye-slash');
        icon.classList.add('fa-eye');
      }
    }

    // Form Submission
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const btn = document.getElementById('loginBtn');
      btn.classList.add('loading');
      
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const remember = document.getElementById('remember').checked;
      
      // Simulate API call
      setTimeout(() => {
        btn.classList.remove('loading');
        
        // Show success message
        const notification = document.createElement('div');
        notification.className = 'notification success';
        notification.innerHTML = `
          <div class="notification-content">
            <i class="fas fa-check-circle"></i>
            <span>Login successful! Redirecting to dashboard...</span>
          </div>
        `;
        document.body.appendChild(notification);
        setTimeout(() => notification.classList.add('show'), 10);
        
        // Redirect to dashboard
        setTimeout(() => {
          window.location.href = '/jeet';
        }, 1500);
      }, 1500);
    });

    // Google Login
    function googleLogin() {
      alert('Google login would redirect to OAuth flow');
    }

    // Update market stats with animation
    function updateMarketStats() {
      const sessionsEl = document.getElementById('activeSessions');
      const volumeEl = document.getElementById('todayVolume');
      
      // Animate numbers
      let sessions = 0;
      const targetSessions = 2847;
      const interval = setInterval(() => {
        sessions += 50;
        if (sessions >= targetSessions) {
          sessions = targetSessions;
          clearInterval(interval);
        }
        sessionsEl.textContent = sessions.toLocaleString();
      }, 20);
    }

    // Initialize
    window.onload = () => {
      initCandlestickBackground();
      initTicker();
      updateMarketStats();
    };

    // Make functions global
    window.togglePassword = togglePassword;
    window.googleLogin = googleLogin;
  </script>

  <style>
    /* Notification styles */
    .notification {
      position: fixed;
      top: 20px;
      right: 20px;
      background: var(--card-bg);
      backdrop-filter: blur(10px);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 16px 24px;
      min-width: 320px;
      box-shadow: var(--shadow-lg);
      transform: translateX(400px);
      opacity: 0;
      transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
      z-index: 10000;
    }

    .notification.show {
      transform: translateX(0);
      opacity: 1;
    }

    .notification.success {
      border-left: 4px solid var(--success);
    }
