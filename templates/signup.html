<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - AlphaAnalytics</title>
  
  <!-- Fonts & Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- AOS Animation -->
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
  
  <!-- Three.js for 3D Graph -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  
  <!-- Chart.js for animated charts -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #6366f1;
      --primary-dark: #4f46e5;
      --primary-light: #818cf8;
      --primary-glow: rgba(99, 102, 241, 0.5);
      --secondary: #10b981;
      --accent: #f59e0b;
      --danger: #ef4444;
      --success: #22c55e;
      --warning: #f97316;
      --dark-bg: #0a0f1e;
      --darker-bg: #050914;
      --card-bg: rgba(15, 23, 42, 0.8);
      --card-border: rgba(99, 102, 241, 0.2);
      --text-primary: #ffffff;
      --text-secondary: #cbd5e1;
      --text-muted: #64748b;
      --gradient-1: linear-gradient(135deg, #6366f1, #a855f7);
      --gradient-2: linear-gradient(135deg, #3b82f6, #2dd4bf);
      --gradient-3: linear-gradient(135deg, #f59e0b, #ef4444);
      
      --shadow-sm: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
      --shadow-lg: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
      --shadow-glow: 0 0 30px var(--primary-glow);
      
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 20px;
      --radius-xl: 30px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--darker-bg);
      color: var(--text-primary);
      min-height: 100vh;
      overflow: hidden;
      position: relative;
    }

    /* 3D Canvas Background */
    #canvas-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    /* Animated Grid Lines */
    .grid-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        linear-gradient(rgba(99, 102, 241, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(99, 102, 241, 0.05) 1px, transparent 1px);
      background-size: 50px 50px;
      z-index: 1;
      pointer-events: none;
      animation: gridMove 20s linear infinite;
    }

    @keyframes gridMove {
      0% { transform: translate(0, 0); }
      100% { transform: translate(50px, 50px); }
    }

    /* Floating Particles */
    .particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      pointer-events: none;
    }

    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: var(--primary);
      border-radius: 50%;
      opacity: 0.3;
      animation: floatParticle 15s infinite;
    }

    @keyframes floatParticle {
      0% {
        transform: translateY(100vh) translateX(0);
        opacity: 0;
      }
      50% {
        opacity: 0.5;
      }
      100% {
        transform: translateY(-100px) translateX(100px);
        opacity: 0;
      }
    }

    /* Live Ticker */
    .ticker-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 100;
      background: rgba(10, 15, 30, 0.9);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(99, 102, 241, 0.3);
      overflow: hidden;
      height: 40px;
    }

    .ticker {
      display: flex;
      animation: tickerScroll 30s linear infinite;
      white-space: nowrap;
    }

    .ticker:hover {
      animation-play-state: paused;
    }

    .ticker-item {
      display: inline-flex;
      align-items: center;
      padding: 0 25px;
      height: 40px;
      font-size: 14px;
      font-weight: 500;
      border-right: 1px solid rgba(99, 102, 241, 0.2);
    }

    .ticker-symbol {
      color: var(--primary-light);
      font-weight: 700;
      margin-right: 8px;
    }

    .ticker-price {
      color: var(--text-primary);
      margin-right: 8px;
    }

    .ticker-change {
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }

    .ticker-change.up {
      background: rgba(34, 197, 94, 0.2);
      color: #22c55e;
    }

    .ticker-change.down {
      background: rgba(239, 68, 68, 0.2);
      color: #ef4444;
    }

    @keyframes tickerScroll {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    /* Main Container */
    .container {
      position: relative;
      z-index: 10;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    /* Glass Card */
    .auth-card {
      background: rgba(15, 23, 42, 0.7);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(99, 102, 241, 0.3);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-lg), 0 0 0 1px rgba(99, 102, 241, 0.2);
      width: 100%;
      max-width: 500px;
      padding: 40px;
      position: relative;
      overflow: hidden;
      animation: cardAppear 1s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .auth-card::before {
      content: '';
      position: absolute;
      top: -2px;
      left: -2px;
      right: -2px;
      bottom: -2px;
      background: var(--gradient-1);
      border-radius: var(--radius-xl);
      z-index: -1;
      animation: borderRotate 4s linear infinite;
      opacity: 0.5;
    }

    .auth-card::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(15, 23, 42, 0.9);
      border-radius: var(--radius-xl);
      z-index: -1;
    }

    @keyframes cardAppear {
      0% {
        opacity: 0;
        transform: scale(0.9) translateY(30px);
      }
      100% {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    @keyframes borderRotate {
      0% { filter: hue-rotate(0deg); }
      100% { filter: hue-rotate(360deg); }
    }

    /* Live Graph Container */
    .live-graph {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100px;
      opacity: 0.2;
      pointer-events: none;
    }

    /* Logo */
    .logo {
      text-align: center;
      margin-bottom: 30px;
      position: relative;
    }

    .logo-icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 15px;
      background: var(--gradient-1);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      animation: logoPulse 2s infinite;
    }

    .logo-icon::before {
      content: '';
      position: absolute;
      inset: -3px;
      border-radius: 50%;
      background: var(--gradient-1);
      opacity: 0.5;
      animation: ripple 2s infinite;
    }

    .logo-icon i {
      font-size: 40px;
      color: white;
      filter: drop-shadow(0 0 10px var(--primary-glow));
    }

    @keyframes logoPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    @keyframes ripple {
      0% {
        transform: scale(1);
        opacity: 0.5;
      }
      100% {
        transform: scale(1.5);
        opacity: 0;
      }
    }

    .logo h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 32px;
      font-weight: 700;
      background: var(--gradient-1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 5px;
      letter-spacing: -0.5px;
    }

    .logo p {
      color: var(--text-muted);
      font-size: 14px;
    }

    /* Form */
    .form-group {
      margin-bottom: 20px;
      position: relative;
    }

    .form-group label {
      display: block;
      color: var(--text-secondary);
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 6px;
      letter-spacing: 0.5px;
    }

    .input-wrapper {
      position: relative;
    }

    .input-wrapper i {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 18px;
      transition: all 0.3s;
      z-index: 1;
    }

    .input-wrapper .toggle-password {
      left: auto;
      right: 16px;
      cursor: pointer;
      transition: all 0.3s;
    }

    .input-wrapper .toggle-password:hover {
      color: var(--primary);
    }

    .form-control {
      width: 100%;
      padding: 16px 16px 16px 48px;
      background: rgba(0, 0, 0, 0.3);
      border: 2px solid rgba(99, 102, 241, 0.2);
      border-radius: var(--radius-md);
      color: var(--text-primary);
      font-size: 15px;
      transition: all 0.3s;
    }

    .form-control:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 20px rgba(99, 102, 241, 0.3);
      background: rgba(0, 0, 0, 0.5);
    }

    .form-control:focus + i {
      color: var(--primary);
      transform: translateY(-50%) scale(1.1);
    }

    /* Name Row */
    .name-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }

    /* Password Strength */
    .password-strength {
      margin-top: 10px;
    }

    .strength-bar {
      display: flex;
      gap: 5px;
      height: 4px;
      margin-bottom: 8px;
    }

    .strength-segment {
      flex: 1;
      height: 100%;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 2px;
      transition: all 0.3s;
    }

    .strength-segment.active:nth-child(1) { background: var(--danger); }
    .strength-segment.active:nth-child(2) { background: var(--warning); }
    .strength-segment.active:nth-child(3) { background: var(--accent); }
    .strength-segment.active:nth-child(4) { background: var(--success); }

    .strength-text {
      font-size: 12px;
      color: var(--text-muted);
    }

    /* Password Match */
    .password-match {
      font-size: 12px;
      margin-top: 5px;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .match-success {
      color: var(--success);
    }

    .match-error {
      color: var(--danger);
    }

    /* Checkbox */
    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
    }

    .checkbox-group input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: var(--primary);
      cursor: pointer;
    }

    .checkbox-group label {
      color: var(--text-secondary);
      font-size: 14px;
      cursor: pointer;
    }

    .checkbox-group a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
      position: relative;
    }

    .checkbox-group a::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      width: 0;
      height: 1px;
      background: var(--primary);
      transition: width 0.3s;
    }

    .checkbox-group a:hover::after {
      width: 100%;
    }

    /* Buttons */
    .btn {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: var(--radius-md);
      font-weight: 600;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      position: relative;
      overflow: hidden;
    }

    .btn::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.2);
      transform: translate(-50%, -50%);
      transition: width 0.6s, height 0.6s;
    }

    .btn:hover::before {
      width: 300px;
      height: 300px;
    }

    .btn-primary {
      background: var(--gradient-1);
      color: white;
      position: relative;
      z-index: 1;
    }

    .btn-primary::after {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--gradient-1);
      border-radius: var(--radius-md);
      filter: blur(10px);
      opacity: 0;
      transition: opacity 0.3s;
      z-index: -1;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
    }

    .btn-primary:hover::after {
      opacity: 0.7;
    }

    .btn-google {
      background: rgba(255, 255, 255, 0.05);
      color: var(--text-primary);
      border: 1px solid rgba(99, 102, 241, 0.3);
      margin-top: 15px;
    }

    .btn-google:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: var(--primary);
      transform: translateY(-2px);
    }

    .btn-google i {
      color: #EA4335;
      font-size: 18px;
    }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 15px;
      margin: 25px 0;
    }

    .divider-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--primary), transparent);
    }

    .divider-text {
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 500;
    }

    /* Footer */
    .auth-footer {
      text-align: center;
      margin-top: 25px;
      color: var(--text-muted);
      font-size: 14px;
    }

    .auth-footer a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
      margin-left: 5px;
      position: relative;
    }

    .auth-footer a::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      width: 0;
      height: 1px;
      background: var(--primary);
      transition: width 0.3s;
    }

    .auth-footer a:hover::after {
      width: 100%;
    }

    /* Market Stats */
    .market-stats {
      display: flex;
      justify-content: space-around;
      margin-top: 30px;
      padding-top: 25px;
      border-top: 1px solid rgba(99, 102, 241, 0.2);
    }

    .stat-item {
      text-align: center;
      flex: 1;
      position: relative;
    }

    .stat-item:not(:last-child)::after {
      content: '';
      position: absolute;
      right: 0;
      top: 50%;
      transform: translateY(-50%);
      width: 1px;
      height: 30px;
      background: linear-gradient(to bottom, transparent, var(--primary), transparent);
    }

    .stat-value {
      font-size: 22px;
      font-weight: 700;
      font-family: 'Space Grotesk', sans-serif;
      color: var(--primary);
      margin-bottom: 4px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .stat-label {
      font-size: 12px;
      color: var(--text-muted);
      letter-spacing: 0.5px;
    }

    /* Loading Animation */
    .loading-dots {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 5px;
    }

    .loading-dots span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: white;
      animation: dots 1.4s infinite;
    }

    .loading-dots span:nth-child(2) {
      animation-delay: 0.2s;
    }

    .loading-dots span:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes dots {
      0%, 100% {
        opacity: 0.3;
        transform: scale(1);
      }
      50% {
        opacity: 1;
        transform: scale(1.2);
      }
    }

    .btn.loading .btn-text {
      display: none;
    }

    .btn.loading .loading-dots {
      display: flex;
    }

    /* Floating Elements */
    .floating-stats {
      position: absolute;
      pointer-events: none;
      z-index: 5;
    }

    .stat-bubble {
      position: absolute;
      background: rgba(99, 102, 241, 0.1);
      backdrop-filter: blur(5px);
      border: 1px solid rgba(99, 102, 241, 0.3);
      border-radius: 20px;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      animation: floatBubble 6s infinite;
    }

    .stat-bubble:nth-child(1) {
      top: 15%;
      left: 3%;
    }

    .stat-bubble:nth-child(2) {
      bottom: 20%;
      right: 3%;
      animation-delay: -2s;
    }

    .stat-bubble:nth-child(3) {
      top: 40%;
      right: 8%;
      animation-delay: -4s;
    }

    @keyframes floatBubble {
      0%, 100% {
        transform: translateY(0) translateX(0);
      }
      50% {
        transform: translateY(-20px) translateX(10px);
      }
    }

    .bubble-icon {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: var(--gradient-1);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }

    .bubble-text {
      font-size: 12px;
      color: var(--text-secondary);
    }

    .bubble-text strong {
      color: var(--primary);
      font-size: 14px;
      display: block;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .auth-card {
        padding: 30px 20px;
      }
      
      .name-row {
        grid-template-columns: 1fr;
        gap: 0;
      }
      
      .stat-bubble {
        display: none;
      }
    }

    @media (max-width: 480px) {
      .auth-card {
        padding: 25px 15px;
      }
      
      .market-stats {
        flex-direction: column;
        gap: 15px;
      }
      
      .stat-item:not(:last-child)::after {
        display: none;
      }
    }

    /* Notification */
    .notification {
      position: fixed;
      top: 60px;
      right: 20px;
      background: rgba(15, 23, 42, 0.9);
      backdrop-filter: blur(10px);
      border: 1px solid var(--primary);
      border-radius: var(--radius-md);
      padding: 16px 24px;
      min-width: 320px;
      box-shadow: var(--shadow-lg), 0 0 30px var(--primary-glow);
      transform: translateX(400px);
      opacity: 0;
      transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
      z-index: 1000;
    }

    .notification.show {
      transform: translateX(0);
      opacity: 1;
    }

    .notification.success {
      border-left: 4px solid var(--success);
    }

    .notification-content {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .notification.success i {
      color: var(--success);
      font-size: 20px;
    }
  </style>
</head>
<body>
  <!-- 3D Canvas Container -->
  <div id="canvas-container"></div>

  <!-- Grid Overlay -->
  <div class="grid-overlay"></div>

  <!-- Particles -->
  <div class="particles" id="particles"></div>

  <!-- Live Ticker -->
  <div class="ticker-container">
    <div class="ticker" id="marketTicker"></div>
  </div>

  <!-- Floating Stats Bubbles -->
  <div class="floating-stats">
    <div class="stat-bubble">
      <div class="bubble-icon">
        <i class="fas fa-users"></i>
      </div>
      <div class="bubble-text">
        <strong>12.5K+</strong>
        <span>Traders</span>
      </div>
    </div>
    <div class="stat-bubble">
      <div class="bubble-icon">
        <i class="fas fa-globe"></i>
      </div>
      <div class="bubble-text">
        <strong>15+</strong>
        <span>Markets</span>
      </div>
    </div>
    <div class="stat-bubble">
      <div class="bubble-icon">
        <i class="fas fa-robot"></i>
      </div>
      <div class="bubble-text">
        <strong>94%</strong>
        <span>AI Accuracy</span>
      </div>
    </div>
  </div>

  <!-- Main Container -->
  <div class="container">
    <div class="auth-card">
      <!-- Live Graph Animation -->
      <canvas id="liveGraph" class="live-graph" width="500" height="100"></canvas>

      <!-- Logo -->
      <div class="logo">
        <div class="logo-icon">
          <i class="fas fa-chart-line"></i>
        </div>
        <h1>AlphaAnalytics</h1>
        <p>Start your trading journey</p>
      </div>

      <!-- Signup Form -->
      <form id="signupForm">
        <div class="name-row">
          <div class="form-group">
            <label>First Name</label>
            <div class="input-wrapper">
              <i class="fas fa-user"></i>
              <input type="text" class="form-control" id="firstName" placeholder="John" required>
            </div>
          </div>

          <div class="form-group">
            <label>Last Name</label>
            <div class="input-wrapper">
              <i class="fas fa-user"></i>
              <input type="text" class="form-control" id="lastName" placeholder="Doe" required>
            </div>
          </div>
        </div>

        <div class="form-group">
          <label>Email Address</label>
          <div class="input-wrapper">
            <i class="fas fa-envelope"></i>
            <input type="email" class="form-control" id="email" placeholder="your@email.com" required>
          </div>
        </div>

        <div class="form-group">
          <label>Phone Number</label>
          <div class="input-wrapper">
            <i class="fas fa-phone"></i>
            <input type="tel" class="form-control" id="phone" placeholder="+1 234 567 890">
          </div>
        </div>

        <div class="form-group">
          <label>Password</label>
          <div class="input-wrapper">
            <i class="fas fa-lock"></i>
            <input type="password" class="form-control" id="password" placeholder="••••••••" required>
            <i class="fas fa-eye toggle-password" onclick="togglePassword('password')"></i>
          </div>
          <div class="password-strength" id="passwordStrength">
            <div class="strength-bar">
              <div class="strength-segment"></div>
              <div class="strength-segment"></div>
              <div class="strength-segment"></div>
              <div class="strength-segment"></div>
            </div>
            <span class="strength-text">Enter a password</span>
          </div>
        </div>

        <div class="form-group">
          <label>Confirm Password</label>
          <div class="input-wrapper">
            <i class="fas fa-lock"></i>
            <input type="password" class="form-control" id="confirmPassword" placeholder="••••••••" required>
            <i class="fas fa-eye toggle-password" onclick="togglePassword('confirmPassword')"></i>
          </div>
          <div id="passwordMatch" class="password-match"></div>
        </div>

        <div class="checkbox-group">
          <input type="checkbox" id="terms" required>
          <label for="terms">
            I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
          </label>
        </div>

        <button type="submit" class="btn btn-primary" id="signupBtn">
          <span class="btn-text">Create Account</span>
          <span class="loading-dots">
            <span></span>
            <span></span>
            <span></span>
          </span>
        </button>

        <div class="divider">
          <span class="divider-line"></span>
          <span class="divider-text">OR</span>
          <span class="divider-line"></span>
        </div>

        <button type="button" class="btn btn-google" onclick="googleSignup()">
          <i class="fab fa-google"></i>
          Sign up with Google
        </button>
      </form>

      <!-- Footer -->
      <div class="auth-footer">
        Already have an account? <a href="/login">Sign In</a>
      </div>

      <!-- Market Stats -->
      <div class="market-stats">
        <div class="stat-item">
          <div class="stat-value" id="activeUsers">12.5K</div>
          <div class="stat-label">Active Traders</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="markets">15+</div>
          <div class="stat-label">Global Markets</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="accuracy">94%</div>
          <div class="stat-label">AI Accuracy</div>
        </div>
      </div>
    </div>
  </div>

  <!-- AOS Animation -->
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  
  <script>
    // Initialize AOS
    AOS.init({
      duration: 800,
      once: true
    });

    // ==================== 3D GRAPH BACKGROUND ====================
    function init3D() {
      const container = document.getElementById('canvas-container');
      
      // Scene
      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x050914);
      
      // Camera
      const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.set(0, 0, 15);
      
      // Renderer
      const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(window.devicePixelRatio);
      container.appendChild(renderer.domElement);
      
      // Lights
      const ambientLight = new THREE.AmbientLight(0x404060);
      scene.add(ambientLight);
      
      const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
      directionalLight.position.set(1, 1, 1);
      scene.add(directionalLight);
      
      const pointLight = new THREE.PointLight(0x6366f1, 1, 20);
      pointLight.position.set(2, 3, 4);
      scene.add(pointLight);
      
      // Create Grid
      const gridHelper = new THREE.GridHelper(30, 30, 0x6366f1, 0x2d3748);
      gridHelper.position.y = -2;
      scene.add(gridHelper);
      
      // Create Floating Bars
      const bars = [];
      const barCount = 50;
      const barMaterial = new THREE.MeshPhongMaterial({ 
        color: 0x6366f1,
        emissive: 0x1a1f3a,
        transparent: true,
        opacity: 0.7
      });
      
      for (let i = 0; i < barCount; i++) {
        const height = Math.random() * 3 + 1;
        const geometry = new THREE.BoxGeometry(0.2, height, 0.2);
        const bar = new THREE.Mesh(geometry, barMaterial);
        
        const x = (Math.random() - 0.5) * 15;
        const z = (Math.random() - 0.5) * 15;
        bar.position.set(x, height/2 - 2, z);
        
        scene.add(bar);
        bars.push(bar);
      }
      
      // Create Particles
      const particleGeometry = new THREE.BufferGeometry();
      const particleCount = 1000;
      const positions = new Float32Array(particleCount * 3);
      
      for (let i = 0; i < particleCount * 3; i += 3) {
        positions[i] = (Math.random() - 0.5) * 40;
        positions[i+1] = (Math.random() - 0.5) * 40;
        positions[i+2] = (Math.random() - 0.5) * 40;
      }
      
      particleGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      
      const particleMaterial = new THREE.PointsMaterial({
        color: 0x6366f1,
        size: 0.05,
        transparent: true,
        opacity: 0.5
      });
      
      const particles = new THREE.Points(particleGeometry, particleMaterial);
      scene.add(particles);
      
      // Create Central Sphere
      const sphereGeometry = new THREE.SphereGeometry(0.5, 32, 32);
      const sphereMaterial = new THREE.MeshPhongMaterial({
        color: 0x6366f1,
        emissive: 0x1a1f3a,
        shininess: 30
      });
      const sphere = new THREE.Mesh(sphereGeometry, sphereMaterial);
      sphere.position.set(0, -1, 0);
      scene.add(sphere);
      
      // Animation
      let time = 0;
      
      function animate() {
        requestAnimationFrame(animate);
        
        time += 0.01;
        
        // Rotate bars
        bars.forEach((bar, index) => {
          bar.rotation.y += 0.01;
          bar.position.y = Math.sin(time + index) * 2 + bar.geometry.parameters.height/2 - 2;
        });
        
        // Rotate particles
        particles.rotation.y += 0.0005;
        particles.rotation.x += 0.0003;
        
        // Rotate sphere
        sphere.rotation.x += 0.01;
        sphere.rotation.y += 0.01;
        
        renderer.render(scene, camera);
      }
      
      animate();
      
      // Handle resize
      window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });
    }

    // ==================== LIVE GRAPH ====================
    function initLiveGraph() {
      const canvas = document.getElementById('liveGraph');
      const ctx = canvas.getContext('2d');
      
      let width = canvas.width;
      let height = canvas.height;
      
      let points = [];
      for (let i = 0; i < 50; i++) {
        points.push(Math.random() * 40 + 30);
      }
      
      function draw() {
        ctx.clearRect(0, 0, width, height);
        
        // Update points
        points.shift();
        points.push(Math.random() * 40 + 30);
        
        // Draw line
        ctx.beginPath();
        ctx.strokeStyle = '#6366f1';
        ctx.lineWidth = 2;
        
        for (let i = 0; i < points.length - 1; i++) {
          const x1 = (i / points.length) * width;
          const y1 = height - points[i];
          const x2 = ((i + 1) / points.length) * width;
          const y2 = height - points[i + 1];
          
          if (i === 0) {
            ctx.moveTo(x1, y1);
          }
          
          ctx.lineTo(x2, y2);
        }
        
        ctx.stroke();
        
        // Draw gradient fill
        ctx.lineTo(width, height);
        ctx.lineTo(0, height);
        ctx.closePath();
        
        const gradient = ctx.createLinearGradient(0, 0, 0, height);
        gradient.addColorStop(0, 'rgba(99, 102, 241, 0.2)');
        gradient.addColorStop(1, 'rgba(99, 102, 241, 0)');
        
        ctx.fillStyle = gradient;
        ctx.fill();
        
        requestAnimationFrame(draw);
      }
      
      draw();
    }

    // ==================== PARTICLES ====================
    function initParticles() {
      const container = document.getElementById('particles');
      
      for (let i = 0; i < 50; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        
        const size = Math.random() * 6 + 2;
        particle.style.width = size + 'px';
        particle.style.height = size + 'px';
        
        particle.style.left = Math.random() * 100 + '%';
        particle.style.animationDelay = Math.random() * 15 + 's';
        particle.style.animationDuration = (Math.random() * 10 + 10) + 's';
        
        container.appendChild(particle);
      }
    }

    // ==================== MARKET TICKER ====================
    function initTicker() {
      const stocks = [
        { symbol: 'AAPL', price: 182.63, change: 1.24 },
        { symbol: 'MSFT', price: 425.50, change: 2.15 },
        { symbol: 'GOOGL', price: 172.34, change: -0.45 },
        { symbol: 'TSLA', price: 245.75, change: -1.23 },
        { symbol: 'NVDA', price: 950.02, change: 5.42 },
        { symbol: 'META', price: 485.60, change: 1.89 },
        { symbol: 'RELIANCE', price: 2856.50, change: 2.35 },
        { symbol: 'TCS', price: 3850.75, change: -0.78 },
        { symbol: 'BTC', price: 52431, change: 3.21 },
        { symbol: 'ETH', price: 3124, change: -0.89 }
      ];
      
      const tickerEl = document.getElementById('marketTicker');
      const tickerItems = [...stocks, ...stocks]; // Duplicate for seamless loop
      
      tickerEl.innerHTML = tickerItems.map(stock => `
        <div class="ticker-item">
          <span class="ticker-symbol">${stock.symbol}</span>
          <span class="ticker-price">${stock.symbol === 'BTC' || stock.symbol === 'ETH' ? '' : '$'}${stock.price.toFixed(2)}</span>
          <span class="ticker-change ${stock.change >= 0 ? 'up' : 'down'}">
            ${stock.change >= 0 ? '+' : ''}${stock.change}%
          </span>
        </div>
      `).join('');
    }

    // ==================== PASSWORD STRENGTH ====================
    function checkPasswordStrength(password) {
      const segments = document.querySelectorAll('.strength-segment');
      const strengthText = document.querySelector('.strength-text');
      
      let strength = 0;
      
      if (password.length >= 8) strength++;
      if (/[A-Z]/.test(password)) strength++;
      if (/[0-9]/.test(password)) strength++;
      if (/[^A-Za-z0-9]/.test(password)) strength++;
      
      segments.forEach((seg, index) => {
        if (index < strength) {
          seg.classList.add('active');
        } else {
          seg.classList.remove('active');
        }
      });
      
      const strengthLabels = ['Weak', 'Fair', 'Good', 'Strong'];
      strengthText.textContent = strength === 0 ? 'Enter a password' : `${strengthLabels[strength-1]} password`;
      
      return strength;
    }

    // ==================== PASSWORD MATCH ====================
    function checkPasswordMatch() {
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirmPassword').value;
      const matchEl = document.getElementById('passwordMatch');
      
      if (confirm.length === 0) {
        matchEl.innerHTML = '';
        return false;
      }
      
      if (password === confirm) {
        matchEl.innerHTML = '<i class="fas fa-check-circle"></i> Passwords match';
        matchEl.className = 'password-match match-success';
        return true;
      } else {
        matchEl.innerHTML = '<i class="fas fa-exclamation-circle"></i> Passwords do not match';
        matchEl.className = 'password-match match-error';
        return false;
      }
    }

    // ==================== TOGGLE PASSWORD ====================
    function togglePassword(fieldId) {
      const field = document.getElementById(fieldId);
      const icon = field.nextElementSibling;
      
      if (field.type === 'password') {
        field.type = 'text';
        icon.classList.remove('fa-eye');
        icon.classList.add('fa-eye-slash');
      } else {
        field.type = 'password';
        icon.classList.remove('fa-eye-slash');
        icon.classList.add('fa-eye');
      }
    }

    // ==================== FORM SUBMISSION ====================
    document.getElementById('signupForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const btn = document.getElementById('signupBtn');
      btn.classList.add('loading');
      
      // Validate passwords match
      if (!checkPasswordMatch()) {
        showNotification('Passwords do not match!', 'error');
        btn.classList.remove('loading');
        return;
      }
      
      // Validate password strength
      const password = document.getElementById('password').value;
      if (checkPasswordStrength(password) < 2) {
        showNotification('Please choose a stronger password!', 'error');
        btn.classList.remove('loading');
        return;
      }
      
      // Simulate API call
      setTimeout(() => {
        btn.classList.remove('loading');
        
        showNotification('Account created successfully! Redirecting...', 'success');
        
        setTimeout(() => {
          window.location.href = '/jeet';
        }, 2000);
      }, 2000);
    });

    // ==================== GOOGLE SIGNUP ====================
    function googleSignup() {
      showNotification('Google signup coming soon!', 'info');
    }

    // ==================== NOTIFICATION ====================
    function showNotification(message, type = 'success') {
      const notification = document.createElement('div');
      notification.className = `notification ${type}`;
      notification.innerHTML = `
        <div class="notification-content">
          <i class="fas ${type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle'}"></i>
          <span>${message}</span>
        </div>
      `;
      document.body.appendChild(notification);
      
      setTimeout(() => notification.classList.add('show'), 100);
      setTimeout(() => {
        notification.classList.remove('show');
        setTimeout(() => notification.remove(), 500);
      }, 3000);
    }

    // ==================== EVENT LISTENERS ====================
    document.getElementById('password').addEventListener('input', (e) => {
      checkPasswordStrength(e.target.value);
      checkPasswordMatch();
    });
    
    document.getElementById('confirmPassword').addEventListener('input', checkPasswordMatch);

    // ==================== UPDATE STATS ====================
    function updateStats() {
      const usersEl = document.getElementById('activeUsers');
      const accuracyEl = document.getElementById('accuracy');
      
      let users = 0;
      const targetUsers = 12500;
      const interval = setInterval(() => {
        users += 200;
        if (users >= targetUsers) {
          users = targetUsers;
          clearInterval(interval);
        }
        usersEl.textContent = (users / 1000).toFixed(1) + 'K';
      }, 20);
    }

    // ==================== INITIALIZE ====================
    window.onload = () => {
      init3D();
      initLiveGraph();
      initParticles();
      initTicker();
      updateStats();
    };

    // Make functions global
    window.togglePassword = togglePassword;
    window.googleSignup = googleSignup;
  </script>
</body>
</html>
