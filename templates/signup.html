<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - AlphaAnalytics</title>
  
  <!-- Fonts & Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- AOS Animation -->
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
  
  <!-- Three.js for 3D Graph -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  
  <!-- Chart.js for animated charts -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  
  <style>
    /* Same styles as login.html - copy all styles from login.html here */
    /* For brevity, I'm not duplicating the styles, but you should copy all styles from login.html */
  </style>
</head>
<body>
  <!-- Same background elements as login.html -->
  <div id="canvas-container"></div>
  <div class="grid-overlay"></div>
  <div class="particles" id="particles"></div>
  
  <!-- Live Ticker -->
  <div class="ticker-container">
    <div class="ticker" id="marketTicker"></div>
  </div>

  <!-- Floating Stats Bubbles -->
  <div class="floating-stats">
    <div class="stat-bubble">
      <div class="bubble-icon">
        <i class="fas fa-users"></i>
      </div>
      <div class="bubble-text">
        <strong>12.5K+</strong>
        <span>Traders</span>
      </div>
    </div>
    <div class="stat-bubble">
      <div class="bubble-icon">
        <i class="fas fa-globe"></i>
      </div>
      <div class="bubble-text">
        <strong>15+</strong>
        <span>Markets</span>
      </div>
    </div>
    <div class="stat-bubble">
      <div class="bubble-icon">
        <i class="fas fa-robot"></i>
      </div>
      <div class="bubble-text">
        <strong>94%</strong>
        <span>AI Accuracy</span>
      </div>
    </div>
  </div>

  <!-- Main Container -->
  <div class="container">
    <div class="auth-card">
      <!-- Live Graph Animation -->
      <canvas id="liveGraph" class="live-graph" width="500" height="100"></canvas>

      <!-- Logo -->
      <div class="logo">
        <div class="logo-icon">
          <i class="fas fa-chart-line"></i>
        </div>
        <h1>AlphaAnalytics</h1>
        <p>Start your trading journey</p>
      </div>

      <!-- Error Message -->
      <div class="error-message" id="errorMessage">
        <i class="fas fa-exclamation-circle"></i>
        <span id="errorText"></span>
      </div>

      <!-- Signup Form -->
      <form id="signupForm">
        <div class="name-row">
          <div class="form-group">
            <label>First Name</label>
            <div class="input-wrapper">
              <i class="fas fa-user"></i>
              <input type="text" class="form-control" id="firstName" placeholder="John" required>
            </div>
          </div>

          <div class="form-group">
            <label>Last Name</label>
            <div class="input-wrapper">
              <i class="fas fa-user"></i>
              <input type="text" class="form-control" id="lastName" placeholder="Doe" required>
            </div>
          </div>
        </div>

        <div class="form-group">
          <label>Email Address</label>
          <div class="input-wrapper">
            <i class="fas fa-envelope"></i>
            <input type="email" class="form-control" id="email" placeholder="your@email.com" required>
          </div>
        </div>

        <div class="form-group">
          <label>Phone Number</label>
          <div class="input-wrapper">
            <i class="fas fa-phone"></i>
            <input type="tel" class="form-control" id="phone" placeholder="+1 234 567 890">
          </div>
        </div>

        <div class="form-group">
          <label>Password</label>
          <div class="input-wrapper">
            <i class="fas fa-lock"></i>
            <input type="password" class="form-control" id="password" placeholder="••••••••" required>
            <i class="fas fa-eye toggle-password" onclick="togglePassword('password')"></i>
          </div>
          <div class="password-strength" id="passwordStrength">
            <div class="strength-bar">
              <div class="strength-segment"></div>
              <div class="strength-segment"></div>
              <div class="strength-segment"></div>
              <div class="strength-segment"></div>
            </div>
            <span class="strength-text">Enter a password</span>
          </div>
        </div>

        <div class="form-group">
          <label>Confirm Password</label>
          <div class="input-wrapper">
            <i class="fas fa-lock"></i>
            <input type="password" class="form-control" id="confirmPassword" placeholder="••••••••" required>
            <i class="fas fa-eye toggle-password" onclick="togglePassword('confirmPassword')"></i>
          </div>
          <div id="passwordMatch" class="password-match"></div>
        </div>

        <div class="checkbox-group">
          <input type="checkbox" id="terms" required>
          <label for="terms">
            I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
          </label>
        </div>

        <button type="submit" class="btn btn-primary" id="signupBtn">
          <span class="btn-text">Create Account</span>
          <span class="loading-dots">
            <span></span>
            <span></span>
            <span></span>
          </span>
        </button>

        <div class="divider">
          <span class="divider-line"></span>
          <span class="divider-text">OR</span>
          <span class="divider-line"></span>
        </div>

        <button type="button" class="btn btn-google" onclick="googleSignup()">
          <i class="fab fa-google"></i>
          Sign up with Google
        </button>
      </form>

      <!-- Footer -->
      <div class="auth-footer">
        Already have an account? <a href="/login">Sign In</a>
      </div>

      <!-- Market Stats -->
      <div class="market-stats">
        <div class="stat-item">
          <div class="stat-value" id="activeUsers">12.5K</div>
          <div class="stat-label">Active Traders</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="markets">15+</div>
          <div class="stat-label">Global Markets</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="accuracy">94%</div>
          <div class="stat-label">AI Accuracy</div>
        </div>
      </div>
    </div>
  </div>

  <!-- AOS Animation -->
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  
  <script>
    // Initialize AOS
    AOS.init({
      duration: 800,
      once: true
    });

    // ==================== 3D GRAPH BACKGROUND ====================
    function init3D() {
      const container = document.getElementById('canvas-container');
      
      // Scene
      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x050914);
      
      // Camera
      const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.set(0, 0, 15);
      
      // Renderer
      const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(window.devicePixelRatio);
      container.appendChild(renderer.domElement);
      
      // Lights
      const ambientLight = new THREE.AmbientLight(0x404060);
      scene.add(ambientLight);
      
      const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
      directionalLight.position.set(1, 1, 1);
      scene.add(directionalLight);
      
      const pointLight = new THREE.PointLight(0x6366f1, 1, 20);
      pointLight.position.set(2, 3, 4);
      scene.add(pointLight);
      
      // Create Grid
      const gridHelper = new THREE.GridHelper(30, 30, 0x6366f1, 0x2d3748);
      gridHelper.position.y = -2;
      scene.add(gridHelper);
      
      // Create Floating Bars
      const bars = [];
      const barCount = 50;
      const barMaterial = new THREE.MeshPhongMaterial({ 
        color: 0x6366f1,
        emissive: 0x1a1f3a,
        transparent: true,
        opacity: 0.7
      });
      
      for (let i = 0; i < barCount; i++) {
        const height = Math.random() * 3 + 1;
        const geometry = new THREE.BoxGeometry(0.2, height, 0.2);
        const bar = new THREE.Mesh(geometry, barMaterial);
        
        const x = (Math.random() - 0.5) * 15;
        const z = (Math.random() - 0.5) * 15;
        bar.position.set(x, height/2 - 2, z);
        
        scene.add(bar);
        bars.push(bar);
      }
      
      // Create Particles
      const particleGeometry = new THREE.BufferGeometry();
      const particleCount = 1000;
      const positions = new Float32Array(particleCount * 3);
      
      for (let i = 0; i < particleCount * 3; i += 3) {
        positions[i] = (Math.random() - 0.5) * 40;
        positions[i+1] = (Math.random() - 0.5) * 40;
        positions[i+2] = (Math.random() - 0.5) * 40;
      }
      
      particleGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      
      const particleMaterial = new THREE.PointsMaterial({
        color: 0x6366f1,
        size: 0.05,
        transparent: true,
        opacity: 0.5
      });
      
      const particles = new THREE.Points(particleGeometry, particleMaterial);
      scene.add(particles);
      
      // Create Central Sphere
      const sphereGeometry = new THREE.SphereGeometry(0.5, 32, 32);
      const sphereMaterial = new THREE.MeshPhongMaterial({
        color: 0x6366f1,
        emissive: 0x1a1f3a,
        shininess: 30
      });
      const sphere = new THREE.Mesh(sphereGeometry, sphereMaterial);
      sphere.position.set(0, -1, 0);
      scene.add(sphere);
      
      // Animation
      let time = 0;
      
      function animate() {
        requestAnimationFrame(animate);
        
        time += 0.01;
        
        // Rotate bars
        bars.forEach((bar, index) => {
          bar.rotation.y += 0.01;
          bar.position.y = Math.sin(time + index) * 2 + bar.geometry.parameters.height/2 - 2;
        });
        
        // Rotate particles
        particles.rotation.y += 0.0005;
        particles.rotation.x += 0.0003;
        
        // Rotate sphere
        sphere.rotation.x += 0.01;
        sphere.rotation.y += 0.01;
        
        renderer.render(scene, camera);
      }
      
      animate();
      
      // Handle resize
      window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });
    }

    // ==================== LIVE GRAPH ====================
    function initLiveGraph() {
      const canvas = document.getElementById('liveGraph');
      const ctx = canvas.getContext('2d');
      
      let width = canvas.width;
      let height = canvas.height;
      
      let points = [];
      for (let i = 0; i < 50; i++) {
        points.push(Math.random() * 40 + 30);
      }
      
      function draw() {
        ctx.clearRect(0, 0, width, height);
        
        // Update points
        points.shift();
        points.push(Math.random() * 40 + 30);
        
        // Draw line
        ctx.beginPath();
        ctx.strokeStyle = '#6366f1';
        ctx.lineWidth = 2;
        
        for (let i = 0; i < points.length - 1; i++) {
          const x1 = (i / points.length) * width;
          const y1 = height - points[i];
          const x2 = ((i + 1) / points.length) * width;
          const y2 = height - points[i + 1];
          
          if (i === 0) {
            ctx.moveTo(x1, y1);
          }
          
          ctx.lineTo(x2, y2);
        }
        
        ctx.stroke();
        
        // Draw gradient fill
        ctx.lineTo(width, height);
        ctx.lineTo(0, height);
        ctx.closePath();
        
        const gradient = ctx.createLinearGradient(0, 0, 0, height);
        gradient.addColorStop(0, 'rgba(99, 102, 241, 0.2)');
        gradient.addColorStop(1, 'rgba(99, 102, 241, 0)');
        
        ctx.fillStyle = gradient;
        ctx.fill();
        
        requestAnimationFrame(draw);
      }
      
      draw();
    }

    // ==================== PARTICLES ====================
    function initParticles() {
      const container = document.getElementById('particles');
      
      for (let i = 0; i < 50; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        
        const size = Math.random() * 6 + 2;
        particle.style.width = size + 'px';
        particle.style.height = size + 'px';
        
        particle.style.left = Math.random() * 100 + '%';
        particle.style.animationDelay = Math.random() * 15 + 's';
        particle.style.animationDuration = (Math.random() * 10 + 10) + 's';
        
        container.appendChild(particle);
      }
    }

    // ==================== MARKET TICKER ====================
    function initTicker() {
      const stocks = [
        { symbol: 'AAPL', price: 182.63, change: 1.24 },
        { symbol: 'MSFT', price: 425.50, change: 2.15 },
        { symbol: 'GOOGL', price: 172.34, change: -0.45 },
        { symbol: 'TSLA', price: 245.75, change: -1.23 },
        { symbol: 'NVDA', price: 950.02, change: 5.42 },
        { symbol: 'META', price: 485.60, change: 1.89 },
        { symbol: 'RELIANCE', price: 2856.50, change: 2.35 },
        { symbol: 'TCS', price: 3850.75, change: -0.78 },
        { symbol: 'BTC', price: 52431, change: 3.21 },
        { symbol: 'ETH', price: 3124, change: -0.89 }
      ];
      
      const tickerEl = document.getElementById('marketTicker');
      const tickerItems = [...stocks, ...stocks];
      
      tickerEl.innerHTML = tickerItems.map(stock => `
        <div class="ticker-item">
          <span class="ticker-symbol">${stock.symbol}</span>
          <span class="ticker-price">${stock.symbol === 'BTC' || stock.symbol === 'ETH' ? '' : '$'}${stock.price.toFixed(2)}</span>
          <span class="ticker-change ${stock.change >= 0 ? 'up' : 'down'}">
            ${stock.change >= 0 ? '+' : ''}${stock.change}%
          </span>
        </div>
      `).join('');
    }

    // ==================== PASSWORD STRENGTH ====================
    function checkPasswordStrength(password) {
      const segments = document.querySelectorAll('.strength-segment');
      const strengthText = document.querySelector('.strength-text');
      
      let strength = 0;
      
      if (password.length >= 8) strength++;
      if (/[A-Z]/.test(password)) strength++;
      if (/[0-9]/.test(password)) strength++;
      if (/[^A-Za-z0-9]/.test(password)) strength++;
      
      segments.forEach((seg, index) => {
        if (index < strength) {
          seg.classList.add('active');
        } else {
          seg.classList.remove('active');
        }
      });
      
      const strengthLabels = ['Weak', 'Fair', 'Good', 'Strong'];
      strengthText.textContent = strength === 0 ? 'Enter a password' : `${strengthLabels[strength-1]} password`;
      
      return strength;
    }

    // ==================== TOGGLE PASSWORD ====================
    function togglePassword(fieldId) {
      const field = document.getElementById(fieldId);
      const icon = field.nextElementSibling;
      
      if (field.type === 'password') {
        field.type = 'text';
        icon.classList.remove('fa-eye');
        icon.classList.add('fa-eye-slash');
      } else {
        field.type = 'password';
        icon.classList.remove('fa-eye-slash');
        icon.classList.add('fa-eye');
      }
    }

    // ==================== PASSWORD MATCH ====================
    function checkPasswordMatch() {
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirmPassword').value;
      const matchEl = document.getElementById('passwordMatch');
      
      if (confirm.length === 0) {
        matchEl.innerHTML = '';
        return false;
      }
      
      if (password === confirm) {
        matchEl.innerHTML = '<i class="fas fa-check-circle"></i> Passwords match';
        matchEl.className = 'password-match match-success';
        return true;
      } else {
        matchEl.innerHTML = '<i class="fas fa-exclamation-circle"></i> Passwords do not match';
        matchEl.className = 'password-match match-error';
        return false;
      }
    }

    // ==================== SHOW ERROR ====================
    function showError(message) {
      const errorEl = document.getElementById('errorMessage');
      const errorText = document.getElementById('errorText');
      errorText.textContent = message;
      errorEl.classList.add('show');
      
      setTimeout(() => {
        errorEl.classList.remove('show');
      }, 5000);
    }

    // ==================== SHOW NOTIFICATION ====================
    function showNotification(message, type = 'success') {
      const notification = document.createElement('div');
      notification.className = `notification ${type}`;
      notification.innerHTML = `
        <div class="notification-content">
          <i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i>
          <span>${message}</span>
        </div>
      `;
      document.body.appendChild(notification);
      
      setTimeout(() => notification.classList.add('show'), 100);
      setTimeout(() => {
        notification.classList.remove('show');
        setTimeout(() => notification.remove(), 500);
      }, 3000);
    }

    // ==================== EVENT LISTENERS ====================
    document.getElementById('password').addEventListener('input', (e) => {
      checkPasswordStrength(e.target.value);
      checkPasswordMatch();
    });
    
    document.getElementById('confirmPassword').addEventListener('input', checkPasswordMatch);

    // ==================== FORM SUBMISSION ====================
    document.getElementById('signupForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const btn = document.getElementById('signupBtn');
      btn.classList.add('loading');
      
      // Validate passwords match
      if (!checkPasswordMatch()) {
        showError('Passwords do not match!');
        btn.classList.remove('loading');
        return;
      }
      
      // Validate password strength
      const password = document.getElementById('password').value;
      if (checkPasswordStrength(password) < 2) {
        showError('Please choose a stronger password!');
        btn.classList.remove('loading');
        return;
      }
      
      // Get form data
      const firstName = document.getElementById('firstName').value;
      const lastName = document.getElementById('lastName').value;
      const email = document.getElementById('email').value;
      const phone = document.getElementById('phone').value;
      
      try {
        // Call the actual backend API
        const response = await fetch('/signup', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            firstName: firstName,
            lastName: lastName,
            email: email,
            password: password,
            phone: phone
          })
        });
        
        const data = await response.json();
        
        if (response.ok && data.success) {
          // Store user info in localStorage
          const userInfo = {
            email: email,
            first_name: firstName,
            last_name: lastName
          };
          localStorage.setItem('alpha_user', JSON.stringify(userInfo));
          
          // Show success message
          showNotification('Account created successfully! Redirecting...', 'success');
          
          // Redirect to dashboard
          setTimeout(() => {
            window.location.href = data.redirect || '/jeet';
          }, 1500);
        } else {
          // Show error message
          btn.classList.remove('loading');
          showError(data.error || 'Signup failed. Please try again.');
        }
      } catch (error) {
        console.error('Signup error:', error);
        btn.classList.remove('loading');
        showError('Network error. Please try again.');
      }
    });

    // ==================== GOOGLE SIGNUP ====================
    function googleSignup() {
      showNotification('Google signup coming soon!', 'info');
    }

    // ==================== UPDATE STATS ====================
    function updateStats() {
      const usersEl = document.getElementById('activeUsers');
      const accuracyEl = document.getElementById('accuracy');
      
      let users = 0;
      const targetUsers = 12500;
      const interval = setInterval(() => {
        users += 200;
        if (users >= targetUsers) {
          users = targetUsers;
          clearInterval(interval);
        }
        usersEl.textContent = (users / 1000).toFixed(1) + 'K';
      }, 20);
    }

    // ==================== INITIALIZE ====================
    window.onload = () => {
      init3D();
      initLiveGraph();
      initParticles();
      initTicker();
      updateStats();
    };

    // Make functions global
    window.togglePassword = togglePassword;
    window.googleSignup = googleSignup;
  </script>

  <style>
    /* Add the same styles as login.html here */
    /* Password strength colors */
    :root {
      --warning: #f59e0b;
    }
    
    .password-strength {
      margin-top: 10px;
    }

    .strength-bar {
      display: flex;
      gap: 5px;
      height: 4px;
      margin-bottom: 8px;
    }

    .strength-segment {
      flex: 1;
      height: 100%;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 2px;
      transition: all 0.3s;
    }

    .strength-segment.active:nth-child(1) { background: var(--danger); }
    .strength-segment.active:nth-child(2) { background: var(--warning); }
    .strength-segment.active:nth-child(3) { background: var(--accent); }
    .strength-segment.active:nth-child(4) { background: var(--success); }

    .strength-text {
      font-size: 12px;
      color: var(--text-muted);
    }

    /* Password match */
    .password-match {
      font-size: 12px;
      margin-top: 5px;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .match-success {
      color: var(--success);
    }

    .match-error {
      color: var(--danger);
    }

    /* Name row */
    .name-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }

    /* Checkbox */
    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
    }

    .checkbox-group input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: var(--primary);
      cursor: pointer;
    }

    .checkbox-group label {
      color: var(--text-secondary);
      font-size: 14px;
      cursor: pointer;
    }

    .checkbox-group a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
    }

    .checkbox-group a:hover {
      text-decoration: underline;
    }

    /* Error message */
    .error-message {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: var(--radius-md);
      padding: 12px;
      margin-bottom: 20px;
      color: var(--danger);
      font-size: 14px;
      display: none;
      align-items: center;
      gap: 10px;
    }

    .error-message.show {
      display: flex;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .name-row {
        grid-template-columns: 1fr;
        gap: 0;
      }
    }
  </style>
</body>
</html>
